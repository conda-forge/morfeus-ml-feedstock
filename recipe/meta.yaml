{% set name = "morfeus-ml" %}
{% set version = "0.8.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: a4d2bf7c665610ca1792fb30639910a0185d0b6b05a6dd361683f2dea2e38c87

build:
  number: 0
  noarch: python
  entry_points:
    - morfeus=morfeus.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - fire
    - numpy
    - python >={{ python_min }}
    - scipy

test:
  imports:
    - morfeus
  commands:
    - pip check
    - morfeus --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/kjelljorner/morfeus
  summary: A Python package for calculating molecular features
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kjelljorner
